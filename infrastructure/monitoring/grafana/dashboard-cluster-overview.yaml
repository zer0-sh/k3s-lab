apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "CPU Usage por Namespace",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{image!=\"\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "stacking": { "mode": "normal" } }
            },
            "overrides": []
          }
        },
        {
          "title": "Memory Usage por Namespace",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{image!=\"\"}) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "stacking": { "mode": "normal" } }
            },
            "overrides": []
          }
        },
        {
          "title": "Pods Running por Namespace",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"}) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 20 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "Pod Restarts (ultimos 30m)",
          "type": "table",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sort_desc(increase(kube_pod_container_status_restarts_total[30m]) > 0)",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "includeByName": { "namespace": true, "pod": true, "Value": true } } }
          ]
        },
        {
          "title": "Node CPU %",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 4, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 85 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "Node Memory %",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 4, "x": 20, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
              "legendFormat": "Memory"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 85 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "Network I/O (todos los pods)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total[5m]))",
              "legendFormat": "Recibido"
            },
            {
              "expr": "sum(rate(container_network_transmit_bytes_total[5m]))",
              "legendFormat": "Transmitido"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "Logs recientes (Loki)",
          "type": "logs",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "loki", "uid": "" },
          "targets": [
            {
              "expr": "{namespace=~\"sample-app|argocd|monitoring|logging\"}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["k3s", "platform", "overview"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "K3s Platform Overview",
      "uid": "k3s-platform-overview"
    }
