name: Trivy Security Scan

on:
  pull_request:
    paths:
      - "apps/**/Dockerfile"
      - "apps/**/docker/**"
  push:
    branches:
      - main
    paths:
      - "apps/**/Dockerfile"
      - "apps/**/docker/**"
  workflow_dispatch:

env:
  IMAGE_NAME: steven58380/k3s-sample-app

jobs:
  scan-image:
    name: Scan Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:scan apps/sample-app/docker/

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          output: trivy-image.txt
          severity: CRITICAL,HIGH,MEDIUM

      - name: Trivy JSON output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: json
          output: trivy-image.json
          severity: CRITICAL,HIGH,MEDIUM

      - name: Generate summary
        if: always()
        run: |
          echo "## 🛡️ Trivy Image Scan — \`${{ env.IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-image.json 2>/dev/null || echo "0")
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-image.json 2>/dev/null || echo "0")
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-image.json 2>/dev/null || echo "0")

          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Critical | ${CRITICAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟠 High | ${HIGH} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟡 Medium | ${MEDIUM} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "> **⛔ Found ${CRITICAL} critical vulnerabilities. Review before deploying.**" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$HIGH" -gt 0 ]; then
            echo "> **⚠️ Found ${HIGH} high vulnerabilities. Consider fixing before deploying.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> **✅ No critical or high vulnerabilities found.**" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full scan output</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat trivy-image.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

  scan-manifests:
    name: Scan K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          output: trivy-config.txt
          severity: CRITICAL,HIGH,MEDIUM

      - name: Trivy config JSON
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: trivy-config.json
          severity: CRITICAL,HIGH,MEDIUM

      - name: Generate summary
        if: always()
        run: |
          echo "## 🔒 Trivy Manifest Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          CRITICAL=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="CRITICAL")] | length' trivy-config.json 2>/dev/null || echo "0")
          HIGH=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="HIGH")] | length' trivy-config.json 2>/dev/null || echo "0")
          MEDIUM=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="MEDIUM")] | length' trivy-config.json 2>/dev/null || echo "0")

          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Critical | ${CRITICAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟠 High | ${HIGH} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟡 Medium | ${MEDIUM} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "<details><summary>Full scan output</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat trivy-config.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
